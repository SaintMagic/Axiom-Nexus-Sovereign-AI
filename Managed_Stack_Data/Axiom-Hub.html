        function normalizePath(raw) {
            let p = String(raw || '').replace(/\\/g, '/').trim();
            p = p.replace(/^[\s"']+|[\s"']+$/g, '');
            p = p.replace(/[.,;:!?]+$/g, '');
            return p;
        }

        function getResponseEnvelope(data) {
            if (Array.isArray(data)) {
                const first = data[0];
                return first && typeof first === 'object' ? first : null;
            }
            if (data && typeof data === 'object') return data;
            return null;
        }

        function updateContextFromResponse(data, requestText, mode) {
            const envelope = getResponseEnvelope(data);
            if (!envelope) return;

            const nested = envelope.json && typeof envelope.json === 'object' ? envelope.json : {};
            const action = String(envelope.action || nested.action || '').toLowerCase();
            const status = String(envelope.status || nested.status || '').toLowerCase();
            const destinationPath = normalizePath(envelope.destinationPath || nested.destinationPath || '');
            const fullPath = normalizePath(
                envelope.fullPath ||
                envelope.path ||
                nested.fullPath ||
                nested.path ||
                destinationPath ||
                envelope.contextLastFilePath ||
                nested.contextLastFilePath ||
                ''
            );
            const contextLastFilePath = normalizePath(envelope.contextLastFilePath || nested.contextLastFilePath || '');
            const pendingClarifyFlag = String(envelope.contextPendingClarify || nested.contextPendingClarify || '').trim();
            const isFileAction = ['write_file', 'read_file', 'move_file', 'delete_file'].includes(action);
            const isSuccessStatus = status === 'success' || status === 'ok';
            const isErrorStatus = status === 'error' || status === 'failed' || status === 'failure';
            const hasExplicitError = !!String(envelope.error || nested.error || '').trim();
            const treatAsSuccess = isSuccessStatus || (isFileAction && !status && !isErrorStatus && !hasExplicitError);

            if (isFileAction) {
                if (treatAsSuccess) {
                    const resolvedPath = fullPath || contextLastFilePath;
                    if (action === 'delete_file') {
                        if (resolvedPath && normalizePath(contextState.lastFilePath) === resolvedPath) {
                            contextState.lastFilePath = '';
                        }
                    } else if (resolvedPath) {
                        contextState.lastFilePath = resolvedPath;
                    }
                }
            }

            if (mode === 'tool' && requestText && requestText.trim() && !/^\s*(?:option\s*)?[1-4]\s*$/i.test(requestText)) {
                contextState.lastUserFileCommand = requestText.trim();
            }

            if (action) contextState.lastToolAction = action;
            contextState.pendingClarify = pendingClarifyFlag ? pendingClarifyFlag === '1' : action === 'clarify';
            contextState.pendingMode = contextState.pendingClarify ? 'clarify' : '';
            contextState.updatedAt = new Date().toISOString();
            persistContextState();
        }

        function exportDebugSnapshot() {
            const now = new Date();
            const stamp = now.toISOString().replace(/[:.]/g, '-');
            const payload = {
                exportedAt: now.toISOString(),
                app: 'Axiom Hub',
                note: 'Contains visible workflow trace and debug metadata. Hidden model internals are not available.',
                currentMode,
                webhookUrls,
                contextState,
                chatHistory: history,
                debugTrace,
            };

            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `axiom-debug-export-${stamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            appendMessage('system', 'Debug export created.');
            saveToHistory('system', 'Debug export created.', new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
        }

        function loadHistory() {
            if (history.length === 0) {
                appendMessage('agent', "Welcome back! I am currently standing by for your commands.");
                return;
            }
            history.forEach(m => appendMessage(m.sender, m.text, m.timestamp, Array.isArray(m.steps) ? m.steps : []));
        }

        function clearHistory() {
            localStorage.removeItem('axiomChatHistory');
            localStorage.removeItem('axiomDebugTrace');
            localStorage.removeItem('axiomContextState');
            history = [];
            debugTrace = [];
            contextState = {
                lastFilePath: '',
                lastUserFileCommand: '',
                lastToolAction: '',
                pendingClarify: false,
                pendingMode: '',
                modelName: modelSelector ? String(modelSelector.value || 'llama3.2') : 'llama3.2',
                updatedAt: '',
            };
            chatWindow.innerHTML = '<div class="message system">History Cleared.</div>';
        }

        async function postToWebhook(payload) {
            let lastResponse = null;
            let lastResponseUrl = '';
            let lastError = null;

            for (const webhookUrl of webhookUrls) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 240000);

                try {
                    const response = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Axiom-Auth': 'axiom-secure-local'
                        },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });

                    lastResponse = response;
                    lastResponseUrl = webhookUrl;

                    // If production webhook is not active, try test webhook automatically.
                    if (response.status === 404) {
                        continue;
                    }

                    return { response, webhookUrl };
                } catch (error) {
                    lastError = error;
                } finally {
                    clearTimeout(timer);
                }
            }

            if (lastResponse) return { response: lastResponse, webhookUrl: lastResponseUrl };
            if (lastError) throw lastError;
            throw new Error("No webhook endpoint available.");
        }

        const AXIOM_DEFAULT_BASE_DIR = 'C:/Users/Martin/.n8n-files/Axiom_Files';

        function isCreateFileRequest(text, mode) {
            if (mode !== 'tool') return false;
            const lower = String(text || '').toLowerCase();
            if (!lower.trim()) return false;
            if (/^\s*confirm\s+delete\b/.test(lower)) return false;
            const createVerb = /\b(create|make|generate|new)\b/.test(lower);
            const fileNoun = /\b(file|txt|text|document|note)\b/.test(lower);
            const blocked = /\b(read|open|show|list|delete|remove|rename|move)\b/.test(lower) && !/\bcreate\b/.test(lower);
            return createVerb && fileNoun && !blocked;
        }

        function sanitizeFileName(rawName, fallback = 'new_file.txt') {
            const fallbackSafe = String(fallback || 'new_file.txt').trim() || 'new_file.txt';
            let name = String(rawName || '').trim();
            if (!name) name = fallbackSafe;
            name = name.replace(/[<>:"/\\|?*\x00-\x1F]/g, '_');
            name = name.replace(/\s+/g, ' ').trim();
            if (!name || name === '.' || name === '..') name = fallbackSafe;
            if (!/\.[A-Za-z0-9]{1,10}$/.test(name)) name += '.txt';
            return name;
        }

        function extractSuggestedFileName(text) {
            const command = String(text || '');
            const namedMatch =
                command.match(/\b(?:name\s+it|named|called)\s+["'`]?([^"'`\n\r]+?)["'`]?(?=$|\s|[.,;:!?])/i) ||
                command.match(/\bfile\s+name\s*[:=]\s*["'`]?([^"'`\n\r]+?)["'`]?(?=$|\s|[.,;:!?])/i);
            const candidate = namedMatch && namedMatch[1] ? namedMatch[1] : 'new_file.txt';
            return sanitizeFileName(candidate, 'new_file.txt');
        }

        async function pickCreateFileTarget(suggestedFileName) {
            const safeName = sanitizeFileName(suggestedFileName, 'new_file.txt');

            if (typeof window.showSaveFilePicker === 'function') {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: safeName,
                        types: [
                            {
                                description: 'Text files',
                                accept: {
                                    'text/plain': ['.txt', '.md', '.log', '.json', '.csv'],
                                },
                            },
                        ],
                        excludeAcceptAllOption: false,
                    });

                    if (handle) {
                        return {
                            kind: 'handle',
                            handle,
                            fileName: sanitizeFileName(handle.name || safeName, safeName),
                        };
                    }
                } catch (error) {
                    if (!(error && error.name === 'AbortError')) {
                        saveDebugTrace('save_picker_error', {
                            source: 'showSaveFilePicker',
                            name: error && error.name ? error.name : 'Error',
                            message: error && error.message ? error.message : 'Unknown save picker error',
                        });
                    }
                }
            }

            const manualDefault = `${AXIOM_DEFAULT_BASE_DIR}/${safeName}`;
            const enteredPath = window.prompt(
                'Windows save picker is not available here. Paste full target file path:',
                manualDefault
            );
            if (!enteredPath || !String(enteredPath).trim()) return null;

            const normalizedManualPath = normalizePath(enteredPath);
            const manualFileName = sanitizeFileName(
                String(normalizedManualPath).replace(/\\/g, '/').split('/').pop() || safeName,
                safeName
            );

            return {
                kind: 'path',
                path: normalizedManualPath,
                fileName: manualFileName,
            };
        }

        async function prepareOutboundRequest(text, mode) {
            const originalText = String(text || '');
            const outbound = {
                requestText: originalText,
                displayText: originalText,
                saveTarget: null,
            };

            if (!isCreateFileRequest(originalText, mode)) {
                return outbound;
            }

            const permissionMessage = 'This command will create a file. After you confirm, you will choose the save location in a Windows dialog.';
            const approved = window.confirm(permissionMessage);
            if (!approved) {
                const systemMsg = 'File creation cancelled.';
                const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                appendMessage('system', systemMsg, systemTimestamp);
                saveToHistory('system', systemMsg, systemTimestamp);
                saveDebugTrace('create_file_cancelled', { reason: 'permission_declined', mode });
                return null;
            }

            const suggestedFileName = extractSuggestedFileName(originalText);
            const target = await pickCreateFileTarget(suggestedFileName);
            if (!target) {
                const systemMsg = 'File creation cancelled (no location selected).';
                const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                appendMessage('system', systemMsg, systemTimestamp);
                saveToHistory('system', systemMsg, systemTimestamp);
                saveDebugTrace('create_file_cancelled', { reason: 'no_target_selected', mode });
                return null;
            }

            if (target.kind === 'handle') {
                const tempPath = `${AXIOM_DEFAULT_BASE_DIR}/${sanitizeFileName(target.fileName, suggestedFileName)}`;
                outbound.requestText = `${originalText}\n\nTarget file path: ${tempPath}`;
                outbound.saveTarget = target;
                saveDebugTrace('create_file_target_selected', {
                    source: 'save_picker',
                    fileName: target.fileName,
                    tempPath,
                });
                return outbound;
            }

            outbound.requestText = `${originalText}\n\nTarget file path: ${target.path}`;
            outbound.saveTarget = target;
            saveDebugTrace('create_file_target_selected', {
                source: 'manual_path',
                fileName: target.fileName,
                path: target.path,
            });
            return outbound;
        }

        async function applyPickedSaveTarget(data, outboundMeta) {
            if (!outboundMeta || !outboundMeta.saveTarget || outboundMeta.saveTarget.kind !== 'handle') return null;

            const envelope = getResponseEnvelope(data);
            if (!envelope || typeof envelope !== 'object') return null;
            const nested = envelope.json && typeof envelope.json === 'object' ? envelope.json : {};
            const action = String(envelope.action || nested.action || '').toLowerCase();
            const status = String(envelope.status || nested.status || '').toLowerCase();
            if (action !== 'write_file' || status !== 'success') return null;

            const content = String(envelope.content ?? nested.content ?? '');
            try {
                const writable = await outboundMeta.saveTarget.handle.createWritable();
                await writable.write(content);
                await writable.close();
                return `I have successfully written the file to your selected location (${outboundMeta.saveTarget.fileName}).`;
            } catch (error) {
                saveDebugTrace('save_picker_write_error', {
                    name: error && error.name ? error.name : 'Error',
                    message: error && error.message ? error.message : 'Could not write to selected save target',
                    fileName: outboundMeta.saveTarget.fileName,
                });
                return `I generated the file, but I could not write it to the selected location (${outboundMeta.saveTarget.fileName}).`;
            }
        }

        // Send payload to n8n
        async function sendPayload(text, mode, outboundMeta = null) {
            const requestText = String((outboundMeta && outboundMeta.requestText) || text || '');
            const displayText = String((outboundMeta && outboundMeta.displayText) || text || '');
            if (!requestText.trim()) return;

            if (!internetSearchEnabled && likelyNeedsInternetSearch(requestText, mode)) {
                const systemMsg = 'This request likely needs live internet data. Click the globe button and choose "Internet search Enabled", then resend.';
                const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                appendMessage('system', systemMsg, systemTimestamp);
                saveToHistory('system', systemMsg, systemTimestamp);
                saveDebugTrace('internet_search_required_but_disabled', {
                    mode,
                    content: requestText,
                });
                return;
            }

            const selectedModelName = String((modelSelector && modelSelector.value) || contextState.modelName || 'llama3.2').trim() || 'llama3.2';
            const selectedModelEntry =
                modelCatalogState.entries.find((entry) => entry.name === selectedModelName) ||
                modelCatalogState.entries.find((entry) => normalizeModelKey(entry.name) === normalizeModelKey(selectedModelName));
            const selectedModelInstalled = isModelInstalled(selectedModelName);

            if (selectedModelEntry && !selectedModelInstalled) {
                const installNow = window.confirm(
                    `Model ${selectedModelEntry.displayName || selectedModelEntry.name} is not installed yet.\n\n` +
                    `Download size: ${selectedModelEntry.downloadSize || 'unknown'}\n` +
                    `${selectedModelEntry.hardware}\n\nInstall now before sending this request?`
                );
                if (!installNow) {
                    const systemMsg = `Request cancelled. Install ${selectedModelEntry.displayName || selectedModelEntry.name} first, or pick an installed model.`;
                    const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    appendMessage('system', systemMsg, systemTimestamp);
                    saveToHistory('system', systemMsg, systemTimestamp);
                    return;
                }
                await installSelectedModel();
                if (!isModelInstalled(selectedModelName)) {
                    const systemMsg = `Model install did not complete for ${selectedModelEntry.displayName || selectedModelEntry.name}. Request not sent.`;
                    const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    appendMessage('system', systemMsg, systemTimestamp);
                    saveToHistory('system', systemMsg, systemTimestamp);
                    return;
                }
            }

            contextState.modelName = selectedModelName;
            contextState.updatedAt = new Date().toISOString();
            persistContextState();
            localStorage.setItem('axiomSelectedModel', selectedModelName);

            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            appendMessage('user', displayText, timestamp);
            saveToHistory('user', displayText, timestamp, [], { contextState: { ...contextState } });
            saveDebugTrace('user_request', {
                mode,
                content: requestText,
                displayText,
                modelName: selectedModelName,
                internetSearchEnabled,
                historyCount: history.length,
            });

            if (mode === 'tool' && requestText.trim() && !/^\s*(?:option\s*)?[1-4]\s*$/i.test(requestText)) {
                contextState.lastUserFileCommand = requestText.trim();
                contextState.updatedAt = new Date().toISOString();
                persistContextState();
            }

            const requestPayload = {
                mode,
                content: requestText,
                modelName: selectedModelName,
                internetSearchEnabled,
                internetSearchMode: internetSearchEnabled ? 'enabled' : 'disabled',
                timestamp: new Date().toISOString(),
                history: history.slice(-20).map((m) => ({
                    sender: m.sender,
                    text: m.text,
                    timestamp: m.timestamp,
                    meta: (m.meta && typeof m.meta === 'object') ? m.meta : {},
                })),
                contextState,
            };

            userInput.value = '';
            userInput.style.height = '24px';
            sendBtn.disabled = true;
            loadingIndicator.classList.add('active');

            // FAKE AGENT FEEDBACK LOOP
            const fakeSteps = [
                "Analyzing request scope...",
                "Initializing Secure Bridge context...",
                "Executing local delegation logic..."
            ];
            saveDebugTrace('local_thinking_steps', { steps: fakeSteps });

            let stepIdx = 0;
            const stepInterval = setInterval(() => {
                if (stepIdx < fakeSteps.length) {
                    loadingText.textContent = fakeSteps[stepIdx];
                    stepIdx++;
                } else {
                    clearInterval(stepInterval);
                }
            }, 800);

            const startedAt = Date.now();

            try {
                const { response, webhookUrl } = await postToWebhook(requestPayload);

                clearInterval(stepInterval);
                loadingText.textContent = "Finalizing response...";
                saveDebugTrace('webhook_response_meta', {
                    webhookUrl,
                    status: response.status,
                    ok: response.ok,
                    latencyMs: Date.now() - startedAt,
                });

                if (response.ok) {
                    const rawText = await response.text();
                    let data = null;

                    if (rawText && rawText.trim() !== "") {
                        try {
                            data = JSON.parse(rawText);
                        } catch {
                            data = rawText;
                        }
                    }

                    let reply = "";
                    if (Array.isArray(data)) {
                        const first = data[0];
                        if (first && typeof first === "object") {
                            reply =
                                first.response ||
                                first.reply ||
                                first.output ||
                                first.message ||
                                (first.json && (first.json.response || first.json.reply || first.json.output || first.json.message || first.json.error)) ||
                                "";
                        }
                    } else if (data && typeof data === "object") {
                        reply =
                            data.response ||
                            data.reply ||
                            data.output ||
                            data.message ||
                            (data.json && (data.json.response || data.json.reply || data.json.output || data.json.message || data.json.error)) ||
                            data.error ||
                            "";
                    } else if (typeof data === "string") {
                        reply = data;
                    }

                    saveDebugTrace('webhook_response_body', {
                        webhookUrl,
                        status: response.status,
                        rawText: String(rawText || '').slice(0, 12000),
                        parsedType: Array.isArray(data) ? 'array' : typeof data,
                        extractedReply: reply,
                    });

                    updateContextFromResponse(data, requestText, mode);
                    const pickerReply = await applyPickedSaveTarget(data, outboundMeta);
                    if (pickerReply) {
                        reply = pickerReply;
                    }

                    if (reply) {
                        const agentSteps = ["Workflow verification passed", "Data encrypted for local storage"];
                        const replyTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        appendMessage('agent', reply, replyTimestamp, agentSteps);
                        saveToHistory('agent', reply, replyTimestamp, agentSteps, {
                            webhookUrl,
                            latencyMs: Date.now() - startedAt,
                            contextState: { ...contextState },
                        });
                        saveDebugTrace('agent_reply', {
                            steps: agentSteps,
                            reply,
                            webhookUrl,
                        });

                        handleDeleteConfirmationPrompt(reply, mode);
                    } else {
                        const systemMsg = "Workflow accepted the request, but no response payload was returned yet.";
                        const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        appendMessage('system', systemMsg, systemTimestamp);
                        saveToHistory('system', systemMsg, systemTimestamp, [], {
                            webhookUrl,
                            status: response.status,
                        });
                        saveDebugTrace('system_notice', {
                            message: systemMsg,
                            webhookUrl,
                            status: response.status,
                        });
                    }
                } else {
                    if (response.status === 404) {
                        const systemMsg = "Webhook not found. Ensure 'Axiom Master Router' is active in n8n.";
                        const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        appendMessage('system', systemMsg, systemTimestamp);
                        saveToHistory('system', systemMsg, systemTimestamp, [], { status: response.status });
                        saveDebugTrace('webhook_error', { message: systemMsg, status: response.status });
                    } else {
                        const systemMsg = `Communication Error: n8n returned ${response.status}.`;
                        const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        appendMessage('system', systemMsg, systemTimestamp);
                        saveToHistory('system', systemMsg, systemTimestamp, [], { status: response.status });
                        saveDebugTrace('webhook_error', { message: systemMsg, status: response.status });
                    }
                }
            } catch (error) {
                clearInterval(stepInterval);
                if (error && error.name === 'AbortError') {
                    const systemMsg = "Connection timeout: Axiom Engine did not answer in time.";
                    const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    appendMessage('system', systemMsg, systemTimestamp);
                    saveToHistory('system', systemMsg, systemTimestamp);
                    saveDebugTrace('request_error', {
                        kind: 'timeout',
                        name: error.name,
                        message: error.message || systemMsg,
                    });
                } else {
                    const systemMsg = "Connection failure: Could not reach Axiom Engine.";
                    const systemTimestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    appendMessage('system', systemMsg, systemTimestamp);
                    saveToHistory('system', systemMsg, systemTimestamp);
                    saveDebugTrace('request_error', {
                        kind: 'connection',
                        name: error && error.name ? error.name : 'Error',
                        message: error && error.message ? error.message : systemMsg,
                    });
                }
            } finally {
                sendBtn.disabled = false;
                loadingIndicator.classList.remove('active');
                loadingText.textContent = "Processing...";
                userInput.focus();
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                (async () => {
                    const outbound = await prepareOutboundRequest(userInput.value, currentMode);
                    if (!outbound) return;
                    sendPayload(userInput.value, currentMode, outbound);
                })();
            }
        });

        sendBtn.addEventListener('click', () => {
            (async () => {
                const outbound = await prepareOutboundRequest(userInput.value, currentMode);
                if (!outbound) return;
                sendPayload(userInput.value, currentMode, outbound);
            })();
        });
        if (internetToggleBtn) {
            internetToggleBtn.addEventListener('click', () => {
                setInternetModalOpen(true);
            });
        }
        if (internetOptionEnabled) {
            internetOptionEnabled.addEventListener('click', () => {
                setInternetSearchEnabled(true, true);
                setInternetModalOpen(false);
                setModelInstallStatus('Internet search enabled.', 'success');
            });
        }
        if (internetOptionDisabled) {
            internetOptionDisabled.addEventListener('click', () => {
                setInternetSearchEnabled(false, true);
                setInternetModalOpen(false);
                setModelInstallStatus('Internet search disabled.', 'warn');
            });
        }
        if (internetModalOverlay) {
            internetModalOverlay.addEventListener('click', (event) => {
                if (event.target === internetModalOverlay) {
                    setInternetModalOpen(false);
                }
            });
        }
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                setInternetModalOpen(false);
            }
        });
        clearHistoryBtn.addEventListener('click', clearHistory);
        exportDebugBtn.addEventListener('click', exportDebugSnapshot);

        // Initial Load
        window.addEventListener('load', () => {
            setInternetSearchEnabled(localStorage.getItem('axiomInternetSearchEnabled') === '1', false);
            initializeModelSelection().catch((error) => {
                setModelInstallStatus(
                    `Model catalog init failed: ${String(error && error.message ? error.message : 'unknown error')}`,
                    'error'
                );
            });
            loadHistory();
            userInput.focus();
        });

    </script>
